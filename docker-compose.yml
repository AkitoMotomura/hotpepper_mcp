services:
  mcp-server:
    build:
      context: .
      target: prod
    ports:
      - "8000:8000"
    environment:
      HOTPEPPER_API_KEY: ${HOTPEPPER_API_KEY}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    restart: unless-stopped

  test:
    build:
      context: .
      target: dev
    environment:
      HOTPEPPER_API_KEY: test_key
    profiles:
      - test
